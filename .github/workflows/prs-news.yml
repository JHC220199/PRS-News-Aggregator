name: PRS local news monitor
 
on:
  schedule:
    # Weekdays only (1-5 = Mon-Fri): 06:40 UTC (morning UK) and 12:40 UTC
    # (early afternoon UK). No weekend runs — the digest's marker-based
    # selection means Monday morning's email automatically covers everything
    # found since Friday afternoon, so weekend news arrives Monday rather
    # than being lost.
    - cron: "40 6 * * 1-5"
    - cron: "40 12 * * 1-5"
  workflow_dispatch:        # allows manual runs from the Actions tab
 
permissions:
  contents: write           # needed to commit the updated database back
 
concurrency:
  group: prs-news
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run the monitor
        run: python prs_news_monitor.py
 
      - name: Build and send the daily digest
        env:
          PRS_GRAPH_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          PRS_GRAPH_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          PRS_GRAPH_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          PRS_SP_HOST:             rlateam.sharepoint.com
          # NOTE: SHAREPOINT_SITE_NAME must hold the server-relative SITE PATH,
          # e.g. /sites/Policy (with leading slash) — not a display name.
          PRS_SP_SITE_PATH:        ${{ secrets.SHAREPOINT_SITE_NAME }}
          PRS_SP_LIBRARY:          'Campaigns & Policy'
          # NOTE: SHAREPOINT_FOLDER_PATH is the folder INSIDE the library,
          # no leading slash, e.g. PRS-news-digest — and it must already exist.
          PRS_SP_FOLDER:           ${{ secrets.SHAREPOINT_FOLDER_PATH }}
          PRS_DASHBOARD_URL:       https://jhc220199.github.io/PRS-News-Aggregator/
        run: python build_digest.py
 
      - name: Commit the updated database
        run: |
          git config user.name  "prs-news-bot"
          git config user.email "actions@github.com"
          git add prs_news.db
          if git diff --staged --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update PRS news database ($(date -u +%Y-%m-%d))"
            git push
          fi
 
